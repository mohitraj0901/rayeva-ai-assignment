<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Product Categorizer</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
width:500px;
}

h2{
text-align:center;
}

textarea{
width:100%;
height:80px;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

pre{
background:#222;
color:#00ff88;
padding:10px;
margin-top:15px;
overflow:auto;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Product Categorizer</h2>

<textarea id="desc" placeholder="Enter product description"></textarea>

<button onclick="generate()">Generate Category</button>

<pre id="result"></pre>

</div>

<script>

async function generate(){

const description=document.getElementById("desc").value;

const response=await fetch("http://localhost:5000/api/ai/category",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
description:description
})
});

const data=await response.json();

document.getElementById("result").textContent=
JSON.stringify(data,null,2);

}

</script>

</body>

</html>
